methodology_summary: >
  We built a two-phase hybrid ranking system. Phase 1 precomputes rule-based
  fit features (title relevance, production ML evidence, retrieval/embeddings
  infrastructure depth, evaluation framework experience) and local CPU
  sentence-transformer embeddings (all-MiniLM-L6-v2) for all 100,000
  candidates and the job description offline with no time limit. Phase 2
  loads these precomputed artifacts and combines them into a final score:
  rule-based features (85% weight) plus semantic similarity (15% weight),
  gated by a strict honeypot consistency check (impossible experience
  timelines, zero-duration expert skills, contradictory job dates) that
  excludes flagged candidates entirely. A behavioral availability multiplier
  based on recruiter response rate, recent activity, and interview completion
  adjusts the final score within a bounded 0.7-1.15 range. The ranking step
  runs in under 25 seconds on CPU with no network access. During development
  we caught and fixed a critical title-relevance bug where non-AI/ML titles
  scored competitively due to insufficient discrimination — a direct instance
  of the keyword-stuffing trap the dataset is designed to test for.

ranking_pipeline:
  phase_1_precompute:
    script_1: precompute_features.py
    script_2: precompute_embeddings.py
    note: Run once offline, no time limit. Generates artifacts/ directory.
  phase_2_ranking:
    script: rank.py
    command: python rank.py --candidates ./candidates.jsonl --out ./submission.csv
    wall_clock_time_seconds: 23.33
    memory_gb: under 16
    gpu_required: false
    network_required: false

honeypot_summary:
  total_flagged: 61
  checks:
    - Expert proficiency with zero duration_months
    - Years of experience wildly inconsistent with career history duration
    - Job start date after end date
    - Individual job tenure stated vs actual date mismatch over 6 months